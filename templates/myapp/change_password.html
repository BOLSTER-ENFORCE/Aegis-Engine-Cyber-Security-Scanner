{% extends "base.html" %}
{% block title %}Change Password | Aegis Engine{% endblock %}
{% block content %}
<div style="max-width:440px; margin:40px auto;">
    <div class="panel" style="text-align:center;">
        <div style="font-size:3rem; margin-bottom:8px;">&#x1f512;</div>
        <h1>Change Password</h1>
        <p class="muted">Update your account password</p>
    </div>

    <form method="post" style="margin-top:16px;">
        {% csrf_token %}
        {% for field in form %}
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        <div style="position:relative;">
            <input type="password" id="{{ field.id_for_label }}" name="{{ field.html_name }}"
                   placeholder="{{ field.label }}" required>
            <button type="button" data-toggle-password="#{{ field.id_for_label }}"
                    style="position:absolute; right:8px; top:50%; transform:translateY(-50%);
                           min-height:28px; padding:2px 8px; font-size:12px;">Show</button>
        </div>
        {% if field.errors %}
            <small style="color:var(--danger); font-size:12px;">{{ field.errors.0 }}</small>
        {% endif %}
        {% endfor %}

        <button type="submit">Change Password</button>
    </form>

    <div style="text-align:center; margin-top:16px;">
        <a href="{% url 'profile' %}" style="font-size:13px; color:var(--accent-2);">Back to Profile</a>
    </div>
</div>
{% endblock %}
