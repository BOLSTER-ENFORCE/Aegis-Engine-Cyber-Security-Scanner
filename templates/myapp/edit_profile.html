{% extends "base.html" %}
{% block title %}Edit Profile | Aegis Engine{% endblock %}
{% block content %}
<div style="max-width:540px; margin:20px auto;">
    <h1>&#x270f; Edit Profile</h1>

    <form method="post" enctype="multipart/form-data" class="wide-form">
        {% csrf_token %}

        <div style="text-align:center; margin-bottom:16px;">
            <div id="avatarPreview"
                 style="width:90px; height:90px; border-radius:50%; margin:0 auto 8px;
                        background:var(--panel-soft); border:3px solid var(--accent);
                        display:grid; place-items:center; font-size:2rem; overflow:hidden;
                        box-shadow: 0 0 16px rgba(32,201,151,0.25);">
                {% if user_obj.profile_image %}
                    <img id="avatarImg" src="{{ user_obj.profile_image.url }}" style="width:100%; height:100%; object-fit:cover;">
                {% else %}
                    <span id="avatarPlaceholder">&#x1f464;</span>
                {% endif %}
            </div>
            <label style="cursor:pointer; color:var(--accent-2); font-size:13px;">
                Upload Profile Picture
                <input type="file" name="profile_image" accept="image/*" style="display:none;" id="imageInput">
            </label>
        </div>

        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" value="{{ user_obj.first_name }}" placeholder="First name">

        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" value="{{ user_obj.last_name }}" placeholder="Last name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ user_obj.email }}" required>

        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" value="{{ user_obj.phone|default:'' }}" placeholder="+1234567890">

        <div class="actions">
            <button type="submit">Save Changes</button>
            <a href="{% url 'profile' %}" class="btn">Cancel</a>
        </div>
    </form>
</div>

<script>
document.getElementById("imageInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        const preview = document.getElementById("avatarPreview");
        let img = document.getElementById("avatarImg");
        const placeholder = document.getElementById("avatarPlaceholder");
        if (placeholder) placeholder.style.display = "none";
        if (!img) {
            img = document.createElement("img");
            img.id = "avatarImg";
            img.style.cssText = "width:100%; height:100%; object-fit:cover;";
            preview.appendChild(img);
        }
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
});
</script>
{% endblock %}
