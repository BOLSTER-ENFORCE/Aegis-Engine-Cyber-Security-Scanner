{% extends "base.html" %}
{% block title %}Contact | Aegis Engine{% endblock %}
{% block content %}
<div style="max-width:540px; margin:20px auto;">
    <div class="panel" style="text-align:center;">
        <div style="font-size:3rem; margin-bottom:8px;">&#x1f4e8;</div>
        <h1>Contact Admin</h1>
        <p class="muted">Send feedback, report issues, or ask questions</p>
    </div>

    <form method="post" style="margin-top:16px;">
        {% csrf_token %}
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{% if user.is_authenticated %}{{ user.username }}{% endif %}" placeholder="Your name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{% if user.is_authenticated %}{{ user.email }}{% endif %}" required placeholder="your@email.com">

        <label for="message_type">Type</label>
        <select id="message_type" name="message_type">
            <option value="suggestion">Suggestion</option>
            <option value="complaint">Complaint</option>
            <option value="question">Question</option>
            <option value="bug_report">Bug Report</option>
            <option value="feature_request">Feature Request</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required placeholder="Describe your feedback..."></textarea>

        <button type="submit">Send To Admin</button>
    </form>
</div>
{% endblock %}
